# WindowsMetrics Configuration File
# Place this file in the same directory as WindowsMetrics.exe

# Home Assistant MQTT URL (without port, include http:// or https://)
MQTT_URL=http://192.168.1.100

# Home Assistant MQTT port (default: 8123)
MQTT_PORT=8123

# Home Assistant Long-Lived Access Token
# Get this from: Profile → Long-Lived Access Tokens
HA_TOKEN=your_home_assistant_token_here

# MQTT Topic Prefix (default: windows)
MQTT_TOPIC_PREFIX=windows

# Schedule Interval in minutes (default: 5)
# The program will automatically create a Windows scheduled task
# to run at this interval
SCHEDULE_INTERVAL=5

# Notes:
# - Lines starting with # or ; are comments
# - Whitespace around = is ignored
# - Quotes around values are optional
# - Empty lines are ignored
#
# Auto-scheduling:
# - Run "WindowsMetrics.exe --install" to create the scheduled task
# - Run "WindowsMetrics.exe --uninstall" to remove the scheduled task
# - Requires administrator privileges to manage scheduled tasks

